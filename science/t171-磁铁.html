<!DOCTYPE html>
<html lang="zh-MY">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单元七：神奇的磁铁</title>
    <link rel="icon" href="../images/logo.png" type="image/png">
    <style>
        /* --- 基础设置 --- */
        body {
            font-family: 'Comic Sans MS', 'KaiTi', 'Segoe UI', sans-serif;
            background-color: #E3F2FD;
            /* 科技蓝背景 */
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
            color: #1565C0;
        }

        .back-btn-corner {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 999;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: #1565C0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-size: 1.2rem;
            transition: all 0.2s;
            border: 2px solid #64B5F6;
        }

        .back-btn-corner:hover {
            background: #BBDEFB;
            transform: scale(1.05);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #BBDEFB;
        }

        p.intro {
            font-size: 1.5rem;
            color: #0D47A1;
            margin-bottom: 30px;
        }

        /* --- 关卡切换 --- */
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .level-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #fff;
            color: #1565C0;
            box-shadow: 0 5px 0 #90CAF9;
            transition: all 0.2s;
            font-weight: bold;
        }

        .level-btn.active {
            background: #1976D2;
            color: white;
            box-shadow: 0 5px 0 #0D47A1;
        }

        .level-btn:hover {
            transform: translateY(-3px);
        }

        .level-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* --- 游戏区域容器 --- */
        .game-stage {
            display: none;
            /* 默认隐藏，JS控制显示 */
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(21, 101, 192, 0.15);
            border: 6px solid #90CAF9;
            min-height: 500px;
        }

        .game-stage.active {
            display: block;
            animation: popIn 0.5s;
        }

        /* ================= 第一关：磁性分类 ================= */
        .sorting-area {
            display: flex;
            justify-content: space-around;
            margin-bottom: 40px;
        }

        .magnet-zone {
            width: 350px;
            height: 350px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
            transition: all 0.3s;
            position: relative;
        }

        /* U型磁铁造型 (吸铁区) */
        #zone-magnetic {
            border: 5px dashed #F44336;
            background: #FFEBEE;
        }

        /* 普通篮子造型 (不吸铁区) */
        #zone-non-magnetic {
            border: 5px dashed #9E9E9E;
            background: #F5F5F5;
        }

        .zone-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* 物品库 */
        .items-pool {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 20px;
            background: #E3F2FD;
            border-radius: 20px;
            max-height: 500px;
            /* 增加高度限制，防止太长 */
            overflow-y: auto;
        }

        .item {
            width: 70px;
            height: 70px;
            /* 稍微缩小一点，容纳更多物品 */
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: grab;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            border: 3px solid #fff;
        }

        .item span {
            font-size: 0.9rem;
            margin-top: 2px;
            font-weight: bold;
            color: #555;
        }

        .item:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        /* 物品被吸住的效果 */
        .item.stuck {
            position: absolute;
            transform: scale(0.7);
            /* 吸入后变小一点 */
            box-shadow: none;
            border: none;
            background: transparent;
            pointer-events: none;
        }

        /* ================= 第二关：相吸相斥 ================= */
        .magnets-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            height: 300px;
            position: relative;
        }

        /* 磁铁样式 */
        .bar-magnet {
            width: 300px;
            height: 100px;
            display: flex;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            font-size: 3rem;
            font-weight: bold;
            color: white;
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pole {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pole-n {
            background-color: #F44336;
            border-radius: 10px 0 0 10px;
        }

        /* 红 */
        .pole-s {
            background-color: #2196F3;
            border-radius: 0 10px 10px 0;
        }

        /* 蓝 */

        /* 翻转后的磁铁 */
        .bar-magnet.flipped .pole-n {
            order: 2;
            border-radius: 0 10px 10px 0;
        }

        .bar-magnet.flipped .pole-s {
            order: 1;
            border-radius: 10px 0 0 10px;
        }

        /* 控制按钮 */
        .control-panel {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .action-btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 0 rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        .btn-flip {
            background: #FF9800;
        }

        .btn-test {
            background: #4CAF50;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 结果文字 */
        #experiment-result {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 30px;
            height: 50px;
            color: #333;
        }

        /* 动画类 */
        .attract-left {
            transform: translateX(75px);
        }

        .attract-right {
            transform: translateX(-75px);
        }

        .repel-left {
            transform: translateX(-100px) rotate(-10deg);
        }

        .repel-right {
            transform: translateX(100px) rotate(10deg);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>

    <!-- Global Light Cyberpunk Theme -->
    <link rel="stylesheet" href="../css/cyberpunk.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>

    <a href="index.html" class="back-btn-corner">⬅ 返回菜单</a>

    <h1>🧲 神奇的磁铁</h1>
    <p class="intro">选择一个实验室，开始探索磁铁的奥秘吧！</p>

    <div class="level-selector">
        <button class="level-btn active" onclick="switchLevel(1)">1. 谁有磁性？</button>
        <button class="level-btn" onclick="switchLevel(2)">2. 相吸还是相斥？</button>
    </div>

    <div id="level-1" class="game-stage active">
        <div class="sorting-area">
            <div class="magnet-zone" id="zone-magnetic" data-type="magnetic">
                <div class="zone-title" style="color: #D32F2F;">🧲 能被吸引 (Berlaku)</div>
                <div style="font-size: 150px; opacity: 0.1; position: absolute; top: 80px;">🧲</div>
            </div>

            <div class="magnet-zone" id="zone-non-magnetic" data-type="non-magnetic">
                <div class="zone-title" style="color: #616161;">🚫 不能被吸引 (Tidak)</div>
                <div style="font-size: 150px; opacity: 0.1; position: absolute; top: 80px;">🪵</div>
            </div>
        </div>

        <div class="items-pool" id="items-container"></div>
        <div id="feedback-l1" style="font-size: 1.5rem; margin-top: 20px; font-weight: bold; color: #4CAF50;"></div>
    </div>

    <div id="level-2" class="game-stage">
        <div style="margin-bottom: 40px; font-size: 1.5rem; color: #555;">
            观察两个磁铁的磁极，点击“开始靠近”看看会发生什么？
        </div>

        <div class="magnets-container">
            <div class="bar-magnet" id="magnet-left">
                <div class="pole pole-n">N</div>
                <div class="pole pole-s">S</div>
            </div>

            <div class="bar-magnet flipped" id="magnet-right">
                <div class="pole pole-n">N</div>
                <div class="pole pole-s">S</div>
            </div>
        </div>

        <div id="experiment-result">准备实验...</div>

        <div class="control-panel">
            <button class="action-btn btn-flip" onclick="flipRightMagnet()">🔄 翻转右边磁铁</button>
            <button class="action-btn btn-test" onclick="runExperiment()">🚀 开始靠近</button>
        </div>
    </div>

    <script>
        // ================= 通用逻辑 =================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'snap') {
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        function switchLevel(level) {
            document.querySelectorAll('.game-stage').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.level-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(`level-${level}`).classList.add('active');
            document.querySelectorAll('.level-btn')[level - 1].classList.add('active');

            if (level === 1) initLevel1();
            if (level === 2) resetLevel2();
        }

        // ================= 第一关逻辑：物品数据升级 =================
        // 20个物品数据，来源自 Lab Simulator
        const itemsData = [
            { name: '铁钉', icon: '🔩', type: 'magnetic' },
            { name: '橡皮', icon: '🧼', type: 'non-magnetic' },
            { name: '钥匙', icon: '🔑', type: 'magnetic' },
            { name: '铅笔', icon: '✏️', type: 'non-magnetic' },
            { name: '回形针', icon: '📎', type: 'magnetic' },
            { name: '塑料瓶', icon: '🥤', type: 'non-magnetic' },
            { name: '螺丝', icon: '🔩', type: 'magnetic' },
            { name: '木积木', icon: '🪵', type: 'non-magnetic' },
            { name: '铁尺', icon: '📏', type: 'magnetic' },
            { name: '弹珠', icon: '🔮', type: 'non-magnetic' },
            { name: '别针', icon: '🧷', type: 'magnetic' },
            { name: '纸张', icon: '📄', type: 'non-magnetic' },
            { name: '剪刀', icon: '✂️', type: 'magnetic' },
            { name: '铝罐', icon: '🥫', type: 'non-magnetic' }, // 铝不吸磁
            { name: '铁勺', icon: '🥄', type: 'magnetic' },
            { name: '金戒指', icon: '💍', type: 'non-magnetic' }, // 金不吸磁
            { name: '螺母', icon: '⚙️', type: 'magnetic' },
            { name: '羽毛', icon: '🪶', type: 'non-magnetic' },
            { name: '订书钉', icon: '🖇️', type: 'magnetic' },
            { name: '棉花', icon: '☁️', type: 'non-magnetic' }
        ];

        function initLevel1() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            document.getElementById('feedback-l1').innerText = '';

            // 打乱顺序
            const shuffled = [...itemsData].sort(() => 0.5 - Math.random());

            shuffled.forEach(item => {
                const el = document.createElement('div');
                el.className = 'item';
                el.draggable = true;
                el.dataset.type = item.type;
                el.innerHTML = `${item.icon}<span>${item.name}</span>`;

                el.ondragstart = (e) => {
                    e.dataTransfer.setData('type', item.type);
                    window.currentDragItem = el;
                };

                // 手机点击支持
                el.onclick = () => {
                    simulateDrop(el, item.type);
                };

                container.appendChild(el);
            });
        }

        const dropZones = document.querySelectorAll('.magnet-zone');
        dropZones.forEach(zone => {
            zone.ondragover = (e) => e.preventDefault();
            zone.ondrop = (e) => {
                e.preventDefault();
                const type = e.dataTransfer.getData('type');
                checkDrop(zone, type, window.currentDragItem);
            };
        });

        function checkDrop(zone, type, element) {
            if (zone.dataset.type === type) {
                // 答对了
                playSound('correct');
                element.classList.add('stuck');
                // 随机放置在篮子里
                const x = Math.random() * 200 + 50;
                const y = Math.random() * 200 + 80;
                element.style.left = x + 'px';
                element.style.top = y + 'px';
                zone.appendChild(element);

                checkWinL1();
            } else {
                // 答错了
                playSound('wrong');
                document.getElementById('feedback-l1').innerText = "哎呀，放错啦！再试试？";
                setTimeout(() => document.getElementById('feedback-l1').innerText = "", 1000);
            }
        }

        function simulateDrop(element, type) {
            const targetZone = document.getElementById(type === 'magnetic' ? 'zone-magnetic' : 'zone-non-magnetic');
            checkDrop(targetZone, type, element);
        }

        function checkWinL1() {
            const remaining = document.getElementById('items-container').children.length;
            if (remaining === 0) {
                document.getElementById('feedback-l1').innerText = "🎉 太棒了！你已经学会分辨磁性物体了！";
                playSound('correct');
            }
        }

        // ================= 第二关逻辑 (保持不变) =================
        let isFlipped = false; // false = N在左, S在右

        function flipRightMagnet() {
            const mag = document.getElementById('magnet-right');
            resetLevel2();
            isFlipped = !isFlipped;
            if (isFlipped) {
                mag.classList.remove('flipped'); // 正常顺序 N-S
            } else {
                mag.classList.add('flipped'); // 翻转 S-N
            }
        }

        function resetLevel2() {
            const left = document.getElementById('magnet-left');
            const right = document.getElementById('magnet-right');
            const resultText = document.getElementById('experiment-result');

            left.className = "bar-magnet";
            right.className = "bar-magnet" + (isFlipped ? "" : " flipped");
            resultText.innerText = "准备实验...";
            resultText.style.color = "#333";
        }

        function runExperiment() {
            const left = document.getElementById('magnet-left');
            const right = document.getElementById('magnet-right');
            const resultText = document.getElementById('experiment-result');

            if (isFlipped) {
                // S (Left) vs N (Right) -> 异极相吸
                left.classList.add('attract-left');
                right.classList.add('attract-right');
                playSound('snap');
                resultText.innerText = "🤝 异极相吸 (Menarik)";
                resultText.style.color = "#2E7D32";
            } else {
                // S (Left) vs S (Right) -> 同极相斥
                left.classList.add('repel-left');
                right.classList.add('repel-right');
                playSound('wrong');
                resultText.innerText = "💨 同极相斥 (Menolak)";
                resultText.style.color = "#D32F2F";
            }
        }

        // 初始化
        initLevel1();
    </script>
</body>

</html>
