<!DOCTYPE html>
<html lang="zh-MY">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../images/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一年级科学：生物与非生物</title>
    <style>
        /* --- 基础样式 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        /* --- 游戏主区域 --- */
        .game-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        /* --- 篮子容器 --- */
        .drop-zone {
            width: 100%;
            max-width: 100%;
            max-width: 100%;
            max-width: 320px;
            min-height: 350px;
            border: 4px dashed #bdc3c7;
            border-radius: 20px;
            background-color: white;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            overflow: hidden;
            position: relative;
        }

        .drop-zone.hover {
            border-color: #3498db;
            background-color: #eaf2f8;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.3);
        }

        .zone-header {
            padding: 15px;
            border-bottom: 2px solid #ecf0f1;
            background-color: #f9f9f9;
        }

        .zone-header h2 {
            margin: 0;
            font-size: 24px;
        }

        .zone-header small {
            font-size: 14px;
            opacity: 0.7;
            display: block;
            margin-top: 5px;
        }

        .zone-content {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: center;
            gap: 10px;
        }

        #zone-living {
            border-color: #2ecc71;
        }

        #zone-living .zone-header {
            color: #27ae60;
            background-color: #eafaf1;
        }

        #zone-non-living {
            border-color: #95a5a6;
        }

        #zone-non-living .zone-header {
            color: #7f8c8d;
            background-color: #f4f6f6;
        }

        /* --- 物品卡片 --- */
        .items-pool {
            min-height: 120px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 20px;
            border-top: 2px solid #eee;
        }

        .draggable-item {
            width: 100%;
            max-width: 80px;
            height: 90px;
            background-color: white;
            border: 2px solid #34495e;
            border-radius: 12px;
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 10;
        }

        .draggable-item .icon {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .draggable-item span {
            font-size: 14px;
            font-weight: bold;
        }

        .draggable-item:active {
            cursor: grabbing;
            transform: scale(1.1) rotate(3deg);
        }

        .draggable-item.dropped {
            cursor: default;
            border-color: transparent;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: none;
            width: 70px;
            height: 80px;
            transform: scale(1);
            animation: landIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .draggable-item.dropped .icon::after {
            content: '✔️';
            font-size: 12px;
            position: absolute;
            top: 0;
            right: 0;
            background: #2ecc71;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes landIn {
            0% {
                transform: scale(0.1);
                opacity: 0;
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* --- 奖励弹窗 --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            max-width: 100%;
            max-width: 600px;
            max-width: 90%;
            position: relative;
        }

        .btn-restart {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
        }

        /* 备用链接按钮 */
        .fallback-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
        }

        .fallback-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        /* 返回按钮样式 */
        .back-btn-corner {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 999;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            color: #555;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-size: 14px;
            transition: all 0.2s;
            border: 1px solid #ccc;
        }

        .back-btn-corner:hover {
            background: white;
            transform: scale(1.05);
            color: #000;
        }
    </style>

    <!-- Global Light Cyberpunk Theme -->
    <link rel="stylesheet" href="../css/cyberpunk.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <a href="index.html" class="back-btn-corner">⬅ 返回菜单</a>
    <h1>🌱 科学分类挑战</h1>
    <p>拖动下方的物品，把它们放进正确的篮子里！</p>

    <div class="game-board">
        <div class="drop-zone" id="zone-living" ondrop="drop(event)" ondragover="allowDrop(event)" data-type="living">
            <div class="zone-header">
                <h2>生物</h2><small>Benda Hidup</small>
            </div>
            <div class="zone-content"></div>
        </div>
        <div class="drop-zone" id="zone-non-living" ondrop="drop(event)" ondragover="allowDrop(event)"
            data-type="non-living">
            <div class="zone-header">
                <h2>非生物</h2><small>Benda Bukan Hidup</small>
            </div>
            <div class="zone-content"></div>
        </div>
    </div>

    <div class="items-pool" id="items-pool"></div>

    <div class="modal-overlay" id="reward-modal">
        <div class="modal-content">
            <h2 style="color: #e67e22;">🎉 恭喜你全部答对！</h2>
            <p>点击下方播放视频来巩固知识：</p>

            <div
                style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:10px; background:#000;">
                <iframe id="video-frame" style="position:absolute; top:0; left:0; width:100%; height:100%;" src=""
                    title="YouTube video player" frameborder="0"
                    allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen>
                </iframe>
            </div>

            <div style="margin-top: 20px;">
                <a href="https://youtu.be/3a5hqIjtOLA" target="_blank" class="fallback-link">📺 如果视频无法播放，点这里去 YouTube
                    看</a>
                <button class="btn-restart" onclick="restartGame()">再玩一次 🔄</button>
            </div>
            <p class="fallback-text">*如果是黑屏，请点击红色按钮跳转观看</p>
        </div>
    </div>

    <script>
        const gameData = [
            { id: 'item1', name: '小猫', type: 'living', icon: '🐱' },
            { id: 'item2', name: '石头', type: 'non-living', icon: '🪨' },
            { id: 'item3', name: '向日葵', type: 'living', icon: '🌻' },
            { id: 'item4', name: '书本', type: 'non-living', icon: '📚' },
            { id: 'item5', name: '小丑鱼', type: 'living', icon: '🐠' },
            { id: 'item6', name: '气球', type: 'non-living', icon: '🎈' },
            { id: 'item7', name: '大树', type: 'living', icon: '🌳' },
            { id: 'item8', name: '帽子', type: 'non-living', icon: '🧢' }
        ];

        let remainingItems = 0;
        // 你的视频 ID
        const rewardVideoId = "3a5hqIjtOLA";

        function initGame() {
            const pool = document.getElementById('items-pool');
            const zoneContents = document.querySelectorAll('.zone-content');
            pool.innerHTML = '';
            zoneContents.forEach(z => z.innerHTML = '');
            remainingItems = gameData.length;
            document.getElementById('reward-modal').style.display = 'none';
            // 重置视频链接，停止后台播放
            document.getElementById('video-frame').src = "";

            [...gameData].sort(() => 0.5 - Math.random()).forEach(item => {
                const div = document.createElement('div');
                div.className = 'draggable-item';
                div.draggable = true;
                div.id = item.id;
                div.dataset.type = item.type;
                div.innerHTML = `<div class="icon">${item.icon}</div><span>${item.name}</span>`;
                div.ondragstart = drag;

                // 增加移动端触摸拖拽支持
                div.style.touchAction = 'none'; // 禁用浏览器默认的触摸操作（如滚动），防止与拖拽冲突
                div.addEventListener('touchstart', handleTouchStart, { passive: false });
                div.addEventListener('touchmove', handleTouchMove, { passive: false });
                div.addEventListener('touchend', handleTouchEnd);
                div.addEventListener('touchcancel', handleTouchCancel);

                pool.appendChild(div);
            });
        }

        function allowDrop(ev) { ev.preventDefault(); if (ev.currentTarget.classList.contains('drop-zone')) ev.currentTarget.classList.add('hover'); }
        document.querySelectorAll('.drop-zone').forEach(z => z.addEventListener('dragleave', () => z.classList.remove('hover')));

        function drag(ev) {
            ev.dataTransfer.setData("text/plain", ev.target.id);
        }

        function drop(ev) {
            ev.preventDefault();
            const dropZone = ev.currentTarget.closest('.drop-zone');
            dropZone.classList.remove('hover');

            // 兼容可能遗留的 text/id 或标准 text/plain
            const itemId = ev.dataTransfer.getData("text/plain") || ev.dataTransfer.getData("text/id") || ev.dataTransfer.getData("text");
            if (!itemId) return; // 避免 null 报错

            const itemElement = document.getElementById(itemId);

            if (itemElement) {
                const itemType = itemElement.dataset.type; // 直接从DOM取type，更稳定
                if (itemType === dropZone.dataset.type) {
                    dropZone.querySelector('.zone-content').appendChild(itemElement);
                    itemElement.classList.add('dropped');
                    itemElement.draggable = false;

                    // 重置内联样式
                    Object.assign(itemElement.style, { position: '', left: '', top: '', zIndex: '', transform: '' });

                    remainingItems--;
                    if (remainingItems === 0) setTimeout(showReward, 800);
                } else {
                    itemElement.animate([{ transform: 'translateX(0)' }, { transform: 'translateX(-10px)' }, { transform: 'translateX(10px)' }, { transform: 'translateX(0)' }], { duration: 300 });
                }
            }
        }

        // --- 手机端触摸拖拽逻辑 ---
        let touchItem = null;
        let touchStartX = 0;
        let touchStartY = 0;
        let originalStyle = {};

        function handleTouchStart(e) {
            if (this.classList.contains('dropped')) return;
            e.preventDefault();
            touchItem = this;
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;

            const rect = this.getBoundingClientRect();
            originalStyle = {
                position: this.style.position,
                left: this.style.left,
                top: this.style.top,
                zIndex: this.style.zIndex,
                transform: this.style.transform
            };

            this.style.position = 'fixed';
            this.style.left = rect.left + 'px';
            this.style.top = rect.top + 'px';
            this.style.zIndex = '9999';
            this.style.transform = 'scale(1.1) rotate(3deg)';
        }

        function handleTouchMove(e) {
            if (!touchItem) return;
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;

            const newLeft = parseFloat(touchItem.style.left) + dx;
            const newTop = parseFloat(touchItem.style.top) + dy;

            touchItem.style.left = newLeft + 'px';
            touchItem.style.top = newTop + 'px';

            touchStartX = touch.clientX;
            touchStartY = touch.clientY;

            // 高亮悬浮区
            touchItem.style.display = 'none';
            const elementUnderTouch = document.elementFromPoint(touch.clientX, touch.clientY);
            touchItem.style.display = '';

            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('hover'));
            if (elementUnderTouch) {
                const zone = elementUnderTouch.closest('.drop-zone');
                if (zone) {
                    zone.classList.add('hover');
                }
            }
        }

        function handleTouchEnd(e) {
            if (!touchItem) return;
            const touch = e.changedTouches[0];
            touchItem.style.display = 'none';
            const elementUnderTouch = document.elementFromPoint(touch.clientX, touch.clientY);
            touchItem.style.display = '';

            let targetZone = elementUnderTouch ? elementUnderTouch.closest('.drop-zone') : null;

            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('hover'));

            if (targetZone) {
                if (touchItem.dataset.type === targetZone.dataset.type) {
                    targetZone.querySelector('.zone-content').appendChild(touchItem);
                    touchItem.classList.add('dropped');
                    touchItem.draggable = false;
                    Object.assign(touchItem.style, { position: '', left: '', top: '', zIndex: '', transform: '' });

                    remainingItems--;
                    if (remainingItems === 0) setTimeout(showReward, 800);
                } else {
                    revertTouchDrop();
                }
            } else {
                revertTouchDrop();
            }
            touchItem = null;
        }

        function revertTouchDrop() {
            Object.assign(touchItem.style, originalStyle);
            touchItem.animate([{ transform: 'translateX(0)' }, { transform: 'translateX(-10px)' }, { transform: 'translateX(10px)' }, { transform: 'translateX(0)' }], { duration: 300 });
        }

        function handleTouchCancel(e) {
            if (!touchItem) return;
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('hover'));
            revertTouchDrop();
            touchItem = null;
        }

        function showReward() {
            const modal = document.getElementById('reward-modal');
            const iframe = document.getElementById('video-frame');
            modal.style.display = 'flex';

            // 关键修改：
            // 1. 去掉了 autoplay (自动播放)，避免被浏览器拦截
            // 2. 链接干净，不带 si 参数
            // 3. 这里的链接是标准嵌入格式
            iframe.src = `https://www.youtube.com/embed/${rewardVideoId}`;
        }

        function restartGame() { initGame(); }
        window.onload = initGame;
    </script>
</body>

</html>
